name: slay_the_flutter
description: "덱을 구성하고 몬스터를 처치하며 보스를 향해 나아가는 Flutter 덱빌딩 로그라이크 카드 게임"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

# ──────────────────────────────────────────────
# Runtime dependencies
# ──────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter

  # 기본 iOS 스타일 아이콘 폰트
  cupertino_icons: ^1.0.8

  # 상태 관리 — MVVM ViewModel 레이어 (Notifier / AsyncNotifier)
  # StateNotifier는 deprecated; Notifier/AsyncNotifier 패턴만 사용한다
  flutter_riverpod: ^2.6.1

  # 로컬 영속성 — XP, 레벨, 해금 목록을 앱 재시작 후에도 유지
  shared_preferences: ^2.3.0

  # 게임 엔진 — 철갑골렘 보스 배경 파티클 효과(보석 반짝임·검 이글거림)에 사용
  flame: ^1.18.0

# ──────────────────────────────────────────────
# Dev / test dependencies  (프로덕션 빌드에 포함되지 않음)
# ──────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter

  # 공식 Flutter 린트 규칙 집합 (analysis_options.yaml에서 include)
  flutter_lints: ^5.0.0

  # 코드 생성 러너 — mockito @GenerateMocks 애노테이션 처리
  build_runner: ^2.4.0

  # ViewModel / 비즈니스 로직 단위 테스트용 Mock 클래스 자동 생성
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/monsters/
    - assets/images/backgrounds/
